name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build Windows executable
        run: uv run python scripts/build_exe.py

      - name: Sign Windows executable
        if: env.SIGN_CERT_PFX != ''
        env:
          SIGN_CERT_PFX: ${{ secrets.SIGN_CERT_PFX }}
          SIGN_CERT_PASS: ${{ secrets.SIGN_CERT_PASS }}
        shell: pwsh
        run: |
          # Decode PFX from base64 secret
          $pfxBytes = [Convert]::FromBase64String($env:SIGN_CERT_PFX)
          $pfxPath  = Join-Path $env:RUNNER_TEMP "code_signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          # Locate signtool from Windows SDK
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
                      Where-Object { $_.FullName -match "x64" } |
                      Sort-Object FullName -Descending |
                      Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }

          # Sign each exe
          Get-ChildItem dist\*.exe | ForEach-Object {
            Write-Host "Signing $($_.Name)..."
            & $signtool sign /f $pfxPath /p $env:SIGN_CERT_PASS /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /d "Universal Dev Manager" $_.FullName
            if ($LASTEXITCODE -ne 0) { Write-Error "Signing failed for $($_.Name)"; exit 1 }
            & $signtool verify /pa $_.FullName
          }

          # Clean up
          Remove-Item $pfxPath -Force

      - uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 fuse libfuse2 \
            libxcb-shape0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-image0 libxcb-randr0 libxcb-render-util0 libfontconfig1 libdbus-1-3 \
            libglib2.0-0 libtiff5 || sudo apt-get install -y libtiff6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build AppImage
        run: uv run bash scripts/build_appimage.sh

      - uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build DMG
        run: uv run bash scripts/build_dmg.sh

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.head_commit.message, 'release:')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Determine Tag Name
        id: determine_tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" =~ ^release:[[:space:]]*([0-9\.]+[A-Za-z0-9\-]*) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            artifacts/windows-exe/*
            artifacts/linux-appimage/*
            artifacts/macos-dmg/*
          generate_release_notes: true
